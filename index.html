<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLAMES — Relationship Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0a0e;
    --card:     #17101a;
    --border:   rgba(255,255,255,0.07);
    --accent:   #e8614d;
    --gold:     #f0c060;
    --rose:     #c8557a;
    --text:     #f2ede8;
    --muted:    #7a6f72;
    --glow:     rgba(232,97,77,0.35);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }

  /* ── Background embers ── */
  .embers {
    position: fixed; inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  .ember {
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0;
    animation: float var(--dur) var(--delay) infinite ease-in;
  }
  @keyframes float {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.2; }
    100% { transform: translateY(-10vh) scale(1.4); opacity: 0; }
  }

  /* ── Main card ── */
  .card {
    position: relative;
    z-index: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 52px 48px 48px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 0 60px rgba(0,0,0,0.6), 0 0 0 1px var(--border);
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 44px;
  }
  .flame-icon {
    font-size: 2.6rem;
    display: block;
    margin-bottom: 12px;
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1) rotate(-2deg); }
    50%       { transform: scale(1.12) rotate(2deg); }
  }
  .title {
    font-family: 'Playfair Display', serif;
    font-size: 2.6rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    background: linear-gradient(135deg, var(--gold) 0%, var(--accent) 60%, var(--rose) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 0.78rem;
    letter-spacing: 0.22em;
    color: var(--muted);
    text-transform: uppercase;
    font-weight: 500;
  }

  /* ── Inputs ── */
  .fields {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 28px;
  }
  .field-wrap {
    position: relative;
  }
  .field-label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 500;
    padding-left: 2px;
  }
  .field-inner {
    position: relative;
    display: flex;
    align-items: center;
  }
  .field-emoji {
    position: absolute;
    left: 16px;
    font-size: 1.1rem;
    pointer-events: none;
    transition: transform 0.2s;
  }
  input[type="text"] {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 16px 16px 48px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 400;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
  }
  input[type="text"]::placeholder { color: rgba(242,237,232,0.22); }
  input[type="text"]:focus {
    border-color: rgba(232,97,77,0.5);
    background: rgba(232,97,77,0.05);
    box-shadow: 0 0 0 3px rgba(232,97,77,0.12);
  }
  input[type="text"]:focus + .field-emoji,
  .field-inner:focus-within .field-emoji {
    transform: scale(1.3) rotate(10deg);
  }

  /* connector */
  .connector {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 4px 0;
  }
  .connector-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .connector-heart {
    color: var(--rose);
    font-size: 0.9rem;
    animation: heartbeat 1.6s ease-in-out infinite;
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    14%       { transform: scale(1.3); }
    28%       { transform: scale(1); }
    42%       { transform: scale(1.15); }
    56%       { transform: scale(1); }
  }

  /* ── Button ── */
  .btn {
    width: 100%;
    padding: 17px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #e8614d 0%, #c8557a 100%);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 24px rgba(200,85,122,0.3);
  }
  .btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(232,97,77,0.45); }
  .btn:hover::before { opacity: 1; }
  .btn:active { transform: translateY(0); }

  /* ripple */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    transform: scale(0);
    animation: ripple 0.55s linear;
    pointer-events: none;
  }
  @keyframes ripple {
    to { transform: scale(4); opacity: 0; }
  }

  /* ── Result ── */
  .result-area {
    margin-top: 32px;
    min-height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .result-card {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px 24px;
    text-align: center;
    opacity: 0;
    transform: translateY(14px) scale(0.97);
    transition: opacity 0.45s cubic-bezier(.22,1,.36,1), transform 0.45s cubic-bezier(.22,1,.36,1);
  }
  .result-card.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  .result-names {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .result-names span { color: var(--text); font-weight: 500; }
  .result-status {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 10px;
  }
  .result-emoji { font-size: 1.8rem; display: block; }
  .result-desc {
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    line-height: 1.6;
  }
  .error-msg {
    font-size: 0.85rem;
    color: var(--muted);
    text-align: center;
    font-style: italic;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .error-msg.visible { opacity: 1; }

  /* ── FLAMES legend ── */
  .legend {
    margin-top: 36px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .legend-item {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
    transition: background 0.2s, border-color 0.2s;
    cursor: default;
  }
  .legend-item.active {
    background: rgba(232,97,77,0.12);
    border-color: rgba(232,97,77,0.4);
    box-shadow: 0 0 16px rgba(232,97,77,0.15);
  }
  .legend-letter {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--accent);
    display: block;
    line-height: 1;
    margin-bottom: 4px;
  }
  .legend-word {
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .legend-item.active .legend-word { color: var(--text); }
</style>
</head>
<body>

<!-- floating embers -->
<div class="embers" id="embers"></div>

<div class="card">
  <div class="header">
    <span class="flame-icon">🔥</span>
    <h1 class="title">FLAMES</h1>
    <p class="subtitle">Relationship Calculator</p>
  </div>

  <div class="fields">
    <div class="field-wrap">
      <label class="field-label" for="name1">First Person</label>
      <div class="field-inner">
        <input type="text" id="name1" placeholder="Enter a name…" autocomplete="off" spellcheck="false">
        <span class="field-emoji">🌹</span>
      </div>
    </div>

    <div class="connector">
      <div class="connector-line"></div>
      <span class="connector-heart">♥</span>
      <div class="connector-line"></div>
    </div>

    <div class="field-wrap">
      <label class="field-label" for="name2">Second Person</label>
      <div class="field-inner">
        <input type="text" id="name2" placeholder="Enter a name…" autocomplete="off" spellcheck="false">
        <span class="field-emoji">💫</span>
      </div>
    </div>
  </div>

  <button class="btn" id="calcBtn">✦ Reveal Destiny ✦</button>

  <div class="result-area" id="resultArea">
    <p class="error-msg" id="errorMsg">Please enter both names to begin ✨</p>
    <div class="result-card" id="resultCard">
      <p class="result-names" id="resultNames"></p>
      <span class="result-emoji" id="resultEmoji"></span>
      <p class="result-status" id="resultStatus"></p>
      <p class="result-desc" id="resultDesc"></p>
    </div>
  </div>

  <!-- FLAMES legend -->
  <div class="legend" id="legend">
    <div class="legend-item" data-status="FRIENDS">
      <span class="legend-letter">F</span>
      <span class="legend-word">Friends</span>
    </div>
    <div class="legend-item" data-status="LOVERS">
      <span class="legend-letter">L</span>
      <span class="legend-word">Lovers</span>
    </div>
    <div class="legend-item" data-status="ADMIRES">
      <span class="legend-letter">A</span>
      <span class="legend-word">Admires</span>
    </div>
    <div class="legend-item" data-status="MARRIAGE">
      <span class="legend-letter">M</span>
      <span class="legend-word">Marriage</span>
    </div>
    <div class="legend-item" data-status="ENEMIES">
      <span class="legend-letter">E</span>
      <span class="legend-word">Enemies</span>
    </div>
    <div class="legend-item" data-status="SECRET LOVERS">
      <span class="legend-letter">S</span>
      <span class="legend-word">Secret Lovers</span>
    </div>
  </div>
</div>

<script>
  /* ── Embers ── */
  const embersEl = document.getElementById('embers');
  for (let i = 0; i < 28; i++) {
    const e = document.createElement('div');
    e.className = 'ember';
    e.style.setProperty('--dur',   (4 + Math.random() * 7) + 's');
    e.style.setProperty('--delay', (Math.random() * 8) + 's');
    e.style.left = Math.random() * 100 + 'vw';
    e.style.width  = (2 + Math.random() * 3) + 'px';
    e.style.height = e.style.width;
    e.style.background = ['#e8614d','#f0c060','#c8557a'][Math.floor(Math.random()*3)];
    embersEl.appendChild(e);
  }

  /* ── Ripple ── */
  document.getElementById('calcBtn').addEventListener('click', function(e) {
    const r = document.createElement('span');
    r.className = 'ripple';
    const rect = this.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    r.style.width = r.style.height = size + 'px';
    r.style.left  = (e.clientX - rect.left  - size / 2) + 'px';
    r.style.top   = (e.clientY - rect.top   - size / 2) + 'px';
    this.appendChild(r);
    setTimeout(() => r.remove(), 600);
    calculate();
  });

  /* Enter key support */
  document.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });

  /* ── FLAMES logic (Python port, bug-fixed) ── */
  const STATUSES = {
    0: { label: 'SECRET LOVERS', emoji: '🤫', color: '#c8557a',
         desc: 'A quiet, unspoken bond — something deeply felt but rarely said aloud.' },
    1: { label: 'FRIENDS',       emoji: '🤝', color: '#6fa3ef',
         desc: 'A solid, genuine connection built on trust and shared moments.' },
    2: { label: 'LOVERS',        emoji: '💕', color: '#e8614d',
         desc: 'Romance is in the air — hearts drawn together in unmistakable chemistry.' },
    3: { label: 'ADMIRES',       emoji: '✨', color: '#f0c060',
         desc: 'One holds the other in high regard — quiet admiration from near or afar.' },
    4: { label: 'MARRIAGE',      emoji: '💍', color: '#a78bfa',
         desc: 'A bond that goes the distance — deep commitment and a shared future.' },
    5: { label: 'ENEMIES',       emoji: '⚔️', color: '#ef4444',
         desc: 'Strong opposing forces — sometimes the most intense connections come from conflict.' },
  };

  function removeCommonLetters(source, reference, acc = '') {
    for (const ch of source) {
      if (!reference.includes(ch)) acc += ch;
    }
    return acc;
  }

  function getFlamesStatus(n1, n2) {
    let unique = removeCommonLetters(n1, n2);
    unique = removeCommonLetters(n2, n1, unique);
    return STATUSES[unique.length % 6];
  }

  function calculate() {
    const n1 = document.getElementById('name1').value.trim();
    const n2 = document.getElementById('name2').value.trim();
    const errorMsg  = document.getElementById('errorMsg');
    const resultCard = document.getElementById('resultCard');

    // reset
    resultCard.classList.remove('visible');
    errorMsg.classList.remove('visible');
    document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('active'));

    if (!n1 || !n2) {
      setTimeout(() => errorMsg.classList.add('visible'), 60);
      return;
    }

    const result = getFlamesStatus(n1, n2);

    document.getElementById('resultNames').innerHTML =
      `<span>${n1}</span> &amp; <span>${n2}</span>`;
    document.getElementById('resultEmoji').textContent  = result.emoji;
    document.getElementById('resultStatus').textContent = result.label;
    document.getElementById('resultStatus').style.color = result.color;
    document.getElementById('resultDesc').textContent   = result.desc;

    // highlight legend
    const match = document.querySelector(`.legend-item[data-status="${result.label}"]`);
    if (match) match.classList.add('active');

    setTimeout(() => resultCard.classList.add('visible'), 60);
  }
</script>
</body>
</html>
